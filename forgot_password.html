<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassTrack | Forgot Password</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="glow-orb"></div>
        <div class="login-card">
            <div class="logo">
                <i class="ri-graduation-cap-fill"></i>
                <span>ClassTrack<strong>Edu</strong></span>
            </div>
            <h2>Reset Password</h2>
            <p class="subtitle">Enter your email or register number to receive a reset link.</p>
            
            <form onsubmit="handleResetPassword(event)">
                <div class="input-group">
                    <label>Email or Register Number</label>
                    <div class="input-wrapper">
                        <i class="ri-mail-line"></i>
                        <input type="text" id="resetInput" placeholder="Enter your detail..." required>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary" id="resetBtn" style="margin-top: 16px;">
                    <span class="btn-text">Send Reset Link</span>
                    <i class="ri-send-plane-fill"></i>
                </button>
            </form>
            
            <div style="text-align: center; margin-top: 24px;">
                <a href="index.html" class="forgot-pwd"><i class="ri-arrow-left-line"></i> Back to Login</a>
            </div>
        </div>
    </div>
    <script>
        function handleResetPassword(e) {
            e.preventDefault();
            const btn = document.getElementById('resetBtn');
            const inputVal = document.getElementById('resetInput').value.trim();
            
            const originalContent = btn.innerHTML;
            btn.innerHTML = 'Checking database...';
            btn.style.opacity = '0.8';

            setTimeout(() => {
                const savedUsers = JSON.parse(localStorage.getItem('admin_users') || '[]');
                const user = savedUsers.find(u => u.id === inputVal || u.email === inputVal || u.id === 'admin');

                if (user || inputVal.toLowerCase() === 'admin') {
                    btn.innerHTML = '<i class="ri-check-line"></i> Link Sent!';
                    btn.style.background = 'var(--success)';
                    btn.style.opacity = '1';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    alert('Register Number or Email not found in our records.');
                    btn.innerHTML = originalContent;
                    btn.style.opacity = '1';
                }
            }, 1000);
        }
    </script>
</body>
</html>
