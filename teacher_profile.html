<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassTrack | Profile</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        .settings-card {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: var(--radius-md);
            padding: 32px;
            max-width: 600px;
        }
        .settings-card h2 { font-size: 1.2rem; margin-bottom: 24px; color: var(--text-primary); }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 8px; }
        .form-group input { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); padding: 12px 16px; border-radius: var(--radius-sm); color: var(--text-primary); outline: none; transition: var(--transition-fast); }
        .form-group input:focus { border-color: var(--accent-primary); }
        .setting-toggle { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid var(--border-color); }
        .setting-toggle:last-child { border-bottom: none; }
        .setting-info h4 { font-size: 0.95rem; margin-bottom: 4px; }
        .setting-info p { font-size: 0.85rem; color: var(--text-secondary); }
        
        /* Custom Switch */
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.1); transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: var(--text-secondary); transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-primary); }
        input:checked + .slider:before { transform: translateX(20px); background-color: white; }
    </style>
</head>
<body>
    <div class="admin-container">
    <aside class="sidebar">
        <div class="logo">
            <i class="ri-graduation-cap-fill"></i>
            <span>ClassTrack<strong>Teacher</strong></span>
        </div>
        <ul class="nav-links">
            <li><a href="teacher.html"><i class="ri-time-line"></i> Hourly Attendance</a></li>
            <li><a href="teacher_daily_attendance.html"><i class="ri-calendar-event-line"></i> Daily Attendance</a></li>
            <li><a href="teacher_reports.html"><i class="ri-file-chart-line"></i> Reports</a></li>
            <li><a href="teacher_classes.html"><i class="ri-group-line"></i> My Classes</a></li>
            <li class="active"><a href="teacher_profile.html"><i class="ri-user-settings-line"></i> Profile</a></li>
            <li><a href="teacher_settings.html"><i class="ri-settings-line"></i> Settings</a></li>
        </ul>
        <div class="logout-wrapper">
            <a href="index.html" class="logout-btn"><i class="ri-logout-circle-line"></i> Logout</a>
        </div>
    </aside>
    <main class="main-content">
        <header class="top-nav">
            <h2 class="nav-title">Profile & Preferences</h2>
            <div class="profile-menu">
                <div class="profile-info">
                    <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=ff6b00&color=fff" alt="Profile" class="avatar">
                    <div class="user-details">
                        <span id="userName" class="name">Faculty Member</span>
                        <span id="userDept" class="reg">Settings Panel</span>
                    </div>
                </div>
            </div>
        </header>

        
        <section class="dashboard-content">
            <h1 class="page-title">Personal Profile</h1>
            <div class="grid-2" style="display: grid; grid-template-columns: 1fr 2fr; gap: 24px;">
                <!-- Left Column -->
                <div class="card" style="text-align: center; padding: 2rem;">
                    <div style="position: relative; display: inline-block;">
                        <img src="https://ui-avatars.com/api/?name=User&background=ff6b00&color=fff" class="avatar" style="width: 120px; height: 120px; font-size: 2rem; border-radius: 50%; border: 4px solid var(--border-color); margin-bottom: 1rem;">
                        <span style="position: absolute; bottom: 20px; right: 0; background: var(--accent-primary); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--bg-card);"><i class="ri-camera-fill"></i></span>
                    </div>
                    <h2 style="font-size: 1.4rem; margin-bottom: 0.2rem;" class="dyn-name">Alex Doe</h2>
                    <p style="color: var(--text-secondary); margin-bottom: 1.5rem;" class="dyn-reg">ID: 20XXBCD123</p>
                    <div style="display: flex; gap: 10px; justify-content: center;">
                        <span class="grid-badge badge-present">Active Status</span>
                    </div>
                </div>

                <!-- Right Column -->
                <div class="card">
                    <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;"><i class="ri-user-settings-line"></i> Identifiable Information</h3>
                    <form>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                            <div class="input-group">
                                <label>Full Legal Name</label>
                                <input type="text" class="dyn-name" value="Alex Doe" readonly style="opacity: 0.7;">
                            </div>
                            <div class="input-group">
                                <label>Institutional ID</label>
                                <input type="text" class="dyn-reg" value="20XXBCD123" readonly style="opacity: 0.7;">
                            </div>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                            <div class="input-group">
                                <label>Primary Email</label>
                                <input type="email" value="alex@classtrack.edu" placeholder="mail@domain.com">
                            </div>
                            <div class="input-group">
                                <label>Mobile Phone</label>
                                <input type="tel" placeholder="+1 (555) 000-0000">
                            </div>
                        </div>
                        <div class="input-group" style="margin-bottom: 2rem;">
                            <label>Residential Address</label>
                            <textarea rows="3" style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); padding: 12px 16px; border-radius: var(--radius-sm); color: var(--text-primary); outline: none; resize: none;" placeholder="123 Campus Layout..."></textarea>
                        </div>
                        <button type="button" class="btn-primary" style="float: right;">Save Profile Data</button>
                    </form>
                </div>
            </div>
        </section>

    </main>
    </div>
    <footer class="site-footer">
        &copy; 2026 ClassTrack. All rights reserved.
    </footer>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
             const user = JSON.parse(localStorage.getItem('nexus_user') || '{}');
             if (user.name) {
                 document.getElementById('settingName').value = user.name;
                 document.getElementById('settingEmail').value = user.id + "@classtrack.edu";
             }
        });
    </script>
</body>
</html>
